<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHNTM Clan - Gestion</title>
    <style>
        /* Fond du site avec un dégradé super sombre et futuriste */
body {
    background: linear-gradient(135deg, #0d0e12 0%, #1a1528 100%);
    color: #ffffff;
    font-family: 'Poppins', 'Segoe UI', sans-serif;
    margin: 0;
    padding: 20px;
}

/* Effet néon violet ultra lourd sur le nom du clan PHNTM */
h1 {
    font-size: 3rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    text-shadow: 0 0 10px #a855f7, 0 0 20px #a855f7, 0 0 30px #7c3aed;
}

/* Modernisation du tableau (container principal) */
.table-container {
    background: rgba(25, 20, 35, 0.6);
    backdrop-filter: blur(10px); /* Effet verre dépoli */
    border: 1px solid rgba(168, 85, 247, 0.2);
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
}

/* Style des lignes du tableau */
.player-row {
    background: rgba(255, 255, 255, 0.03);
    border-left: 4px solid #a855f7; /* Petite barre violette à gauche */
    margin-bottom: 10px;
    padding: 15px;
    border-radius: 6px;
    transition: transform 0.2s, background 0.2s;
}

/* Animation quand on passe la souris sur un joueur */
.player-row:hover {
    transform: translateX(5px);
    background: rgba(168, 85, 247, 0.1);
}

/* Boutons plus modernes */
button {
    background: linear-gradient(90deg, #7c3aed 0%, #a855f7 100%);
    border: none;
    color: white;
    padding: 10px 20px;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
    transition: all 0.3s ease;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(168, 85, 247, 0.6);
}
    </style>
</head>
<body>

    <h1>Clan <span>PHNTM</span></h1>

    <div class="admin-zone">
        <input type="password" id="pass-input" placeholder="Mot de passe Admin pour modifier">
        <button onclick="toggleAdmin()">Mode Édition</button>
    </div>

    <div id="admin-panel">
        <h3 style="color:#66fcf1">Ajouter / Modifier un membre</h3>
        <input type="hidden" id="player-id">
        <input type="text" id="p-name" placeholder="Pseudo du joueur">
        <select id="p-rank">
            <option value="phantom">👑 PHANTOM</option>
            <option value="immortal">⚡ IMMORTAL</option>
            <option value="diamond">💎 DIAMOND</option>
            <option value="veteran">⚔️ VETERAN</option>
            <option value="challenger">🔥 CHALLENGER</option>
            <option value="rookie">🔰 ROOKIE</option>
        </select>
        <input type="text" id="p-note" placeholder="Note / Rôle">
        <button onclick="savePlayer()">Enregistrer</button>
        <button onclick="resetForm()" style="background:#6c757d">Annuler</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Pseudo</th>
                <th>Rang de Skill</th>
                <th>Note</th>
                <th class="admin-action" style="display:none">Actions</th>
            </tr>
        </thead>
        <tbody id="roster-body"></tbody>
    </table>

    <script>
        let isAdmin = false;

        async function loadPlayers() {
            const res = await fetch('/api/players');
            const players = await res.json();
            const body = document.getElementById('roster-body');
            body.innerHTML = '';

            players.forEach(p => {
                body.innerHTML += `
                    <tr>
                        <td style="font-weight:bold; color:white">${p.name}</td>
                        <td><span class="badge rank-${p.rank}">${p.rank.toUpperCase()}</span></td>
                        <td>${p.note}</td>
                        <td class="admin-action" style="display:${isAdmin ? 'table-cell' : 'none'}">
                            <button class="btn-action btn-edit" onclick="editPlayer('${p._id}', '${p.name}', '${p.rank}', '${p.note}')">Modifier</button>
                            <button class="btn-action" onclick="deletePlayer('${p._id}')">Supprimer</button>
                        </td>
                    </tr>
                `;
            });
        }

        function toggleAdmin() {
            const pass = document.getElementById('pass-input').value;
            if(!pass) return alert("Rentre ton mot de passe !");
            isAdmin = true;
            document.getElementById('admin-panel').style.display = 'flex';
            document.querySelectorAll('.admin-action').forEach(el => el.style.display = 'table-cell');
            loadPlayers();
        }

        async function savePlayer() {
            const id = document.getElementById('player-id').value;
            const name = document.getElementById('p-name').value;
            const rank = document.getElementById('p-rank').value;
            const note = document.getElementById('p-note').value;
            const password = document.getElementById('pass-input').value;

            const res = await fetch('/api/players', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password, id, name, rank, note })
            });
            
            if(res.ok) {
                resetForm();
                loadPlayers();
            } else {
                alert("Erreur (vérifie ton mot de passe)");
            }
        }

        async function deletePlayer(id) {
            if(!confirm("Supprimer ce joueur ?")) return;
            const password = document.getElementById('pass-input').value;
            await fetch('/api/players/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password, id })
            });
            loadPlayers();
        }

        function editPlayer(id, name, rank, note) {
            document.getElementById('player-id').value = id;
            document.getElementById('p-name').value = name;
            document.getElementById('p-rank').value = rank;
            document.getElementById('p-note').value = note;
        }

        function resetForm() {
            document.getElementById('player-id').value = '';
            document.getElementById('p-name').value = '';
            document.getElementById('p-note').value = '';
        }

        loadPlayers();
    </script>
</body>
</html>
