<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHNTM Clan - Gestion & Communauté</title>
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --panel-bg: rgba(20, 20, 28, 0.7);
            --neon-violet: #a855f7;
            --neon-glow: rgba(168, 85, 247, 0.4);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem 1rem;
            background-image: radial-gradient(circle at 50% -20%, #2e1065 0%, #0a0a0f 80%);
        }

        .container { max-width: 1100px; margin: 0 auto; }

        /* HEADER */
        header { text-align: center; margin-bottom: 3rem; }
        .clan-logo-title { 
            font-size: 4rem; font-weight: 900; letter-spacing: 6px; text-transform: uppercase; 
            color: #fff; text-shadow: 0 0 20px var(--neon-violet); 
        }

        /* PANELS GLASS */
        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            margin-bottom: 2rem;
        }

        .panel-title { font-size: 1.2rem; margin-bottom: 1.5rem; border-left: 4px solid var(--neon-violet); padding-left: 0.8rem; text-transform: uppercase; }

        /* STATS */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
        .stat-card { background: var(--panel-bg); border: 1px solid rgba(168, 85, 247, 0.2); border-radius: 16px; padding: 1.5rem; text-align: center; }
        .stat-val { font-size: 2rem; font-weight: bold; color: var(--neon-violet); }

        /* TABLEAU */
        table { width: 100%; border-collapse: separate; border-spacing: 0 0.5rem; }
        th { padding: 1rem; color: var(--text-muted); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
        td { padding: 1.2rem 1rem; background: rgba(255,255,255,0.02); }
        tr:hover td { background: rgba(168, 85, 247, 0.05); }

        /* BOUTONS */
        .btn { 
            background: transparent; border: 1px solid var(--neon-violet); color: var(--neon-violet); 
            padding: 0.6rem 1.2rem; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: 600;
        }
        .btn:hover { background: var(--neon-violet); color: white; box-shadow: 0 0 15px var(--neon-glow); }
        
        /* RANK BADGES */
        .rank-badge { padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .rank-phantom { background: #a855f7; color: white; }
        .rank-elite { background: #ef4444; color: white; }
        .rank-master { background: #3b82f6; color: white; }
        .rank-member { background: rgba(255,255,255,0.1); color: white; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="clan-logo-title">PHNTM</div>
        <div class="clan-subtitle" style="color:var(--text-muted)">Database Opérationnelle & Roster Officiel</div>
    </header>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-val" id="stat-total">0</div><div class="stat-label">Membres Actifs</div></div>
        <div class="stat-card"><div class="stat-val" id="stat-phantom">0</div><div class="stat-label">Grades Phantom</div></div>
        <div class="stat-card"><div class="stat-val" id="stat-elite">0</div><div class="stat-label">Grades Élite</div></div>
    </div>

    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;">
        <main class="panel">
            <div class="panel-title">Roster du Clan</div>
            <input type="text" id="search-input" placeholder="Rechercher..." oninput="filterPlayers()" style="background:rgba(0,0,0,0.3); border:1px solid #333; padding:0.8rem; border-radius:8px; color:white; width:100%; margin-bottom:1rem;">
            
            <button class="btn" style="margin-bottom:1rem;" onclick="toggleAdminPanel()">Mode Édition</button>
            <div id="admin-panel" style="display:none; margin-bottom:1rem; padding:1rem; border:1px dashed #444; border-radius:8px;">
                <input type="text" id="player-pseudo" placeholder="Pseudo">
                <select id="player-rank"><option>Phantom</option><option>Élite Tier</option><option>Master</option><option>Membre</option></select>
                <button class="btn" onclick="savePlayer()">Enregistrer</button>
            </div>

            <table>
                <thead><tr><th>Pseudo</th><th>Rang</th><th>Note</th><th>Actions</th></tr></thead>
                <tbody id="roster-tbody"></tbody>
            </table>
        </main>

        <aside>
            <div class="panel">
                <div class="panel-title">À Propos</div>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Bienvenue sur la plateforme officielle du clan <strong>PHNTM</strong>.</p>
            </div>
            <div class="panel">
                <div class="panel-title">Communauté</div>
                <button class="btn" style="width:100%">Rejoindre le Discord</button>
            </div>
        </aside>
    </div>
</div>

</script>

</body>
</html>
