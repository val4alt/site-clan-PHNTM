<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHNTM Clan - Roster</title>
    <style>
        body { background: #0a0a0f; color: #f3f4f6; font-family: sans-serif; padding: 2rem; }
        .container { max-width: 1100px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 2rem; }
        th, td { padding: 1rem; border-bottom: 1px solid #333; text-align: left; }
        .rank-badge { padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>PHNTM Clan</h1>
    <input type="text" id="search" placeholder="Rechercher..." oninput="filter()">
    
    <table id="roster">
        <thead>
            <tr><th>Pseudo</th><th>Rang</th><th>Note</th></tr>
        </thead>
        <tbody id="tbody">
            <tr><td>Pseudo1</td><td><span class="rank-badge">Phantom</span></td><td>Note</td></tr>
            </tbody>
    </table>
</div>

<script>
    function filter() {
        const query = document.getElementById('search').value.toLowerCase();
        const rows = document.querySelectorAll('#tbody tr');
        rows.forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(query) ? '' : 'none';
        });
    }
</script>
</body>
</html>
